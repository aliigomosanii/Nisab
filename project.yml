name: Nisab
options:
  bundleIdPrefix: com.aligomosani
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  createIntermediateGroups: true

targets:
  Nisab:
    type: application
    platform: iOS
    sources:
      - Nisab
    info:
      path: Nisab/Info.plist
      properties:
        CFBundleDisplayName: Tejoury
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        CFBundleLocalizations: [en, ar, ur]
        UILaunchScreen: {}
        UISupportedInterfaceOrientations: [UIInterfaceOrientationPortrait]
        ITSAppUsesNonExemptEncryption: false
        NSFaceIDUsageDescription: Unlock Tejoury with Face ID.
        NSCameraUsageDescription: Take photos of your jewelry and invoices.
    settings:
      base:
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1"
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: SYR87KN495
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        PRODUCT_BUNDLE_IDENTIFIER: com.aligomosani.nisab
